<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b1220">
    <title>AnywhereInput - Remote Control</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/base.css?v=1.3.0">                                            
    <link rel="stylesheet" href="/static/stream.css?v=1.3.0">                                          
    <link rel="stylesheet" href="/static/controls.css?v=1.3.0">                                        
    <link rel="stylesheet" href="/static/components.css?v=1.3.0"></head>
<body>
    <div id="app">
        <!-- Watch Mode Exit Button (removed - watch mode button now toggles) -->

        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-card">
                <div class="logo">
                    <img src="/static/favicon.ico" alt="AnywhereInput Logo" width="56" height="56">
                    <h1>AnywhereInput</h1>
                    <p>Remote control your PC from any browser</p>
                </div>

                <!-- Request access form (default) -->
                <form id="request-form">
                    <div class="input-group">
                        <label>Your Name</label>
                        <input type="text" id="client-name" placeholder="Enter your name" required autocomplete="name">
                    </div>
                    <button type="submit" class="btn-primary btn-request">Request Connection</button>
                </form>

                <!-- Approval message (hidden until approved) -->
                <div id="approval-msg" style="display:none;">
                    <div class="approval-box">
                        <div class="approval-header">
                            <span>✅ Access Approved!</span>
                            <button id="dismiss-approval" class="dismiss-btn">✕</button>
                        </div>
                        <p>Your token:</p>
                        <div class="token-display">
                            <input type="text" id="approved-token" readonly>
                            <button id="copy-token-btn" class="btn-copy-token">📋</button>
                        </div>
                        <button id="connect-with-token" class="btn-primary btn-connect-token">Connect</button>
                    </div>
                </div>

                <!-- Toggle: "Already have a token?" -->
                <div class="toggle-existing">
                    <a href="#" id="existing-token-toggle">Already have a token?</a>
                </div>

                <!-- Hidden connect form (shown when toggle clicked) -->
                <form id="connect-form" style="display:none; margin-top:12px;">
                    <div class="input-group">
                        <label>Server URL</label>
                        <input type="text" id="server-url" placeholder="http://IP:8008 or tunnel URL" required>
                    </div>
                    <div class="input-group">
                        <label>Access Token</label>
                        <input type="password" id="access-token" placeholder="Paste token from admin" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-primary">Connect</button>
                </form>

                <!-- Connection request status -->
                <div class="connection-status" id="connection-status"></div>
            </div>
        </div>


        <!-- Main Control Screen -->
        <div id="control-screen" class="screen">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="status-wrap">
                    <div class="status-indicator" id="status-dot"></div>
                    <span id="status-text">Connecting...</span>
                </div>
                <div class="top-actions">
                    <button id="btn-keyboard" class="icon-btn" title="Keyboard">⌨️</button>
                    <button id="btn-settings" class="icon-btn" title="Settings">⚙️</button>
                    <button id="btn-disconnect" class="icon-btn danger" title="Disconnect">✕</button>
                </div>
            </header>

            <!-- Screen Stream -->
            <div class="screen-container" id="screen-container">
                <img id="screen-stream" alt="Screen Stream" draggable="false">
                <!-- Top info bar -->
                <div class="stream-top-bar" id="stream-top-bar">
                    <span class="stream-status" id="stream-status-dot">●</span>
                    <span class="stream-info" id="stream-info"></span>
                    <span class="stream-monitor" id="stream-monitor"></span>
                    <span class="stream-engine-state healthy" id="engine-state-badge">ENGINE: HEALTHY</span>
                </div>
                <!-- Bottom info bar -->
                <div class="stream-bottom-bar" id="stream-bottom-bar">
                    <span class="stream-mode" id="stream-mode">Mouse</span>
                    <span class="stream-sensitivity" id="stream-sens"></span>
                    <span class="fps-counter" id="fps-counter">0 FPS</span>
                </div>
                <div class="stream-overlay" id="stream-overlay">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    <p>Paste your token to connect</p>
                </div>
            </div>

            <!-- Touchpad Area -->
            <div class="touchpad-area" id="touchpad">
                <div class="touchpad-hint" id="touchpad-hint">Drag to move pointer</div>
            </div>

            <!-- Action Buttons -->
            <div class="actions-panel">
                <div class="actions-grid">
                    <button class="ctrl-btn" data-action="left-click">Left Click</button>
                    <button class="ctrl-btn" data-action="right-click">Right Click</button>
                    <button class="ctrl-btn" data-action="double-click">Double Click</button>
                    <button class="ctrl-btn" data-action="scroll-up">▲ Scroll</button>
                    <button class="ctrl-btn" data-action="center">Center</button>
                    <button class="ctrl-btn" data-action="scroll-down">▼ Scroll</button>
                </div>

                <div class="actions-row">
                    <select id="mode-selector" class="mode-selector">
                        <option value="mouse">Mouse Mode</option>
                        <option value="keyboard">Keyboard Input</option>
                        <option value="paint">Paint Mode</option>
                    </select>
                </div>
            </div>

            <!-- Watch Mode Toggle Button -->
            <button id="btn-watch-mode" class="icon-btn watch-mode-toggle" title="Enter Fullscreen">👁️</button>

            <!-- Keyboard Modal -->
            <div id="keyboard-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>⌨️ Keyboard &amp; Hotkeys</h3>
                        <button class="close-btn" id="close-keyboard">&times;</button>
                    </div>

                    <!-- Tabs -->
                    <div class="kb-tabs">
                        <button class="kb-tab active" data-tab="text">Text</button>
                        <button class="kb-tab" data-tab="shortcuts">Shortcuts</button>
                        <button class="kb-tab" data-tab="system">System</button>
                        <button class="kb-tab" data-tab="arrows">Arrows</button>
                    </div>

                    <!-- Text Tab -->
                    <div class="kb-tab-content active" id="tab-text">
                        <input type="text" id="keyboard-input" placeholder="Type here..." autocomplete="off">
                        <div class="modal-actions">
                            <button id="send-text" class="btn-primary">Send</button>
                            <button id="send-enter" class="btn-secondary">Enter</button>
                            <button id="send-esc" class="btn-secondary">Esc</button>
                            <button id="send-tab" class="btn-secondary">Tab</button>
                            <button id="send-backspace" class="btn-secondary">Backspace</button>
                        </div>
                    </div>

                    <!-- Shortcuts Tab -->
                    <div class="kb-tab-content" id="tab-shortcuts">
                        <div class="hotkey-grid">
                            <button class="hotkey-btn" data-keys="ctrl,c">Copy</button>
                            <button class="hotkey-btn" data-keys="ctrl,x">Cut</button>
                            <button class="hotkey-btn" data-keys="ctrl,v">Paste</button>
                        </div>
                        <div class="hotkey-grid">
                            <button class="hotkey-btn" data-keys="ctrl,a">Select All</button>
                            <button class="hotkey-btn" data-keys="ctrl,z">Undo</button>
                            <button class="hotkey-btn" data-keys="ctrl,y">Redo</button>
                        </div>
                        <div class="hotkey-grid">
                            <button class="hotkey-btn" data-keys="ctrl,s">Save</button>
                            <button class="hotkey-btn" data-keys="ctrl,f">Find</button>
                            <button class="hotkey-btn" data-keys="ctrl,w">Close</button>
                        </div>
                        <div class="hotkey-grid">
                            <button class="hotkey-btn" data-keys="ctrl,n">New</button>
                            <button class="hotkey-btn" data-keys="ctrl,r">Refresh</button>
                            <button class="hotkey-btn" data-keys="ctrl,t">New Tab</button>
                        </div>
                        <!-- Platform-specific extras (injected by JS) -->
                        <div id="shortcuts-platform-extras"></div>
                    </div>

                    <!-- System Tab -->
                    <div class="kb-tab-content" id="tab-system">
                        <div class="hotkey-grid">
                            <button class="hotkey-btn danger" data-keys="ctrl,alt,delete">Ctrl+Alt+Del</button>
                            <button class="hotkey-btn" data-keys="alt,tab">Switch Window</button>
                            <button class="hotkey-btn danger" data-keys="alt,f4">Close Window</button>
                        </div>
                        <div class="hotkey-grid">
                            <button class="hotkey-btn" data-keys="ctrl,shift,esc">Task Manager</button>
                            <button class="hotkey-btn" data-keys="printscreen">Screenshot</button>
                            <button class="hotkey-btn" data-keys="ctrl,esc">Start Menu</button>
                        </div>
                        <!-- Platform-specific system extras (injected by JS) -->
                        <div id="system-platform-extras"></div>
                    </div>

                    <!-- Arrows Tab -->
                    <div class="kb-tab-content" id="tab-arrows">
                        <div class="arrows-grid">
                            <div class="arrow-row">
                                <div class="arrow-spacer"></div>
                                <button class="arrow-btn" data-key="up" title="Up">▲</button>
                                <div class="arrow-spacer"></div>
                            </div>
                            <div class="arrow-row">
                                <button class="arrow-btn" data-key="left" title="Left">◀</button>
                                <button class="arrow-btn" data-key="down" title="Down">▼</button>
                                <button class="arrow-btn" data-key="right" title="Right">▶</button>
                            </div>
                        </div>
                        <div class="arrow-actions">
                            <button class="arrow-btn nav-btn" data-key="pageup" title="Page Up">PgUp</button>
                            <button class="arrow-btn nav-btn" data-key="home" title="Home">Home</button>
                            <button class="arrow-btn nav-btn" data-key="end" title="End">End</button>
                            <button class="arrow-btn nav-btn" data-key="pagedown" title="Page Down">PgDn</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settings Panel -->
            <div id="settings-panel" class="side-panel">
                <div class="panel-header">
                    <h3>⚙️ Settings</h3>
                    <button class="close-btn" id="close-settings">&times;</button>
                </div>
                <div class="panel-body">
                    <div class="setting-item">
                        <label>Screen Capture</label>
                        <label class="toggle">
                            <input type="checkbox" id="setting-screen" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item" id="monitor-setting" style="display:none;">
                        <label>Monitor</label>
                        <select id="setting-monitor">
                            <option value="0">🎯 Auto (follow cursor)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>Mouse Speed</label>
                        <div class="slider-wrap">
                            <input type="range" id="setting-sensitivity" min="0.5" max="3.0" step="0.1" value="1.5">
                            <span class="value" id="sensitivity-value">1.5x</span>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label>Show FPS</label>
                        <label class="toggle">
                            <input type="checkbox" id="setting-fps">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>Tap to Click</label>
                        <label class="toggle">
                            <input type="checkbox" id="setting-tap-click" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <label>Long Press = Right Click</label>
                        <label class="toggle">
                            <input type="checkbox" id="setting-long-press" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-item">
                        <button class="btn-primary btn-restart-stream" id="btn-settings-restart-stream" style="width:100%">⟳ Restart Stream</button>
                    </div>
                </div>
            </div>
            <!-- Watch Mode Keyboard Button -->
            <button id="btn-watch-mode-keyboard" class="icon-btn watch-mode-toggle" title="Keyboard">⌨️</button>
        </div>
    </div>
</div>

    <div id="screen-status-overlay" aria-live="polite" role="status"></div>
    <script type="module" src="/static/app.js?v=1.3.0"></script>
</body>
</html>
