[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anywhereinput"
version = "1.1.3"
description = "Remote control your PC from any browser."
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Z-Hussein"}
]
keywords = ["remote-control", "screen-sharing", "websocket"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.9"
dependencies = [
    "pyautogui>=0.9.54",
    "aiohttp>=3.8.0",
    "requests>=2.28.0",
    "qrcode[pil]>=0.12.0",
    "mss>=9.0.0",
    "Pillow>=9.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0",
    "flake8>=6.0",
    "mypy>=1.0",
]

[project.scripts]
anywhereinput = "anywhereinput.server:main"
ai-server = "anywhereinput.server:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
anywhereinput = ["static/*", "static/**/*"][build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

